services:
  db:
    image: postgres:16-alpine
    container_name: reserva_db
    environment:
      POSTGRES_USER: ${DB_USERNAME:?DB_USERNAME not set in .env}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD not set in .env}
      POSTGRES_DB: ${DB_DATABASE:?DB_DATABASE not set in .env}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: reserva_web
    env_file:
      - .env
    environment:
      DB_HOST: db
      DB_PORT: "5432"
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"
    restart: unless-stopped

volumes:
  postgres_data:
