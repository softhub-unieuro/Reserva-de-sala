{% load static %}
<div class="relative">
    <input type="password" 
           name="{{ widget.name }}"
           {% include "django/forms/widgets/attrs.html" with widget=widget %}
           class="form-control pr-10"
           data-toggle-password="true">
    <button type="button" 
            class="togglePasswordBtn absolute right-3 top-1/2 transform -translate-y-1/2 text-gray-400 hover:text-gray-600">
        <i class="fas fa-eye eyeIcon"></i>
    </button>
</div>
<script>
    document.addEventListener('DOMContentLoaded', function() {
        const inputs = document.querySelectorAll('[data-toggle-password="true"]');
        inputs.forEach(input => {
            const btn = input.parentElement.querySelector('.togglePasswordBtn');
            const icon = btn.querySelector('.eyeIcon');
            
            if (btn && input) {
                btn.addEventListener('click', function(e) {
                    e.preventDefault();
                    const type = input.getAttribute('type') === 'password' ? 'text' : 'password';
                    input.setAttribute('type', type);
                    
                    if (type === 'text') {
                        icon.classList.remove('fa-eye');
                        icon.classList.add('fa-eye-slash');
                    } else {
                        icon.classList.remove('fa-eye-slash');
                        icon.classList.add('fa-eye');
                    }
                });
            }
        });
    });
</script>
